<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>TFT s17辅助脚本</title>
<style>
  :root{
    color-scheme: dark;
    --bg:#0B0E1A; --panel:#131A30; --panel2:#1A2240; --line:#26304F;
    --txt:#F2F4FF; --dim:#8A93B5;
    --c1:#9AA4AF; --c2:#4CAF6E; --c3:#4C8FE0; --c4:#B45BE6; --c5:#E3A93F;
    --acc:#7A90FF; --gold:#E3A93F;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    min-height:100%;
    background: radial-gradient(1100px 700px at 72% -10%, #1B2246 0%, var(--bg) 55%, #06070F 100%) fixed;
    color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Noto Sans CJK SC","Segoe UI",sans-serif;
    padding-bottom:40px;
  }
  header{padding:16px 16px 8px;display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  header h1{font-size:1.2rem;letter-spacing:.06em;text-shadow:0 0 20px rgba(122,144,255,.35)}
  header .ver{font-size:.7rem;color:var(--dim);border:1px solid var(--line);border-radius:999px;padding:2px 8px}
  main{padding:0 12px;display:flex;flex-direction:column;gap:12px;max-width:560px;margin:0 auto}
  section{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px}
  section h2{font-size:.8rem;color:var(--dim);font-weight:600;letter-spacing:.12em;margin-bottom:10px}
  .mini{font-size:.74rem;color:var(--dim);line-height:1.55}
  .btn{width:100%;padding:12px 0;border-radius:10px;border:1px solid var(--line);
    background:#101632;color:var(--txt);font-size:.92rem;font-weight:600}
  .btn:active{background:#232e5c}
  .card{width:100%;text-align:left;background:var(--panel2);border:1px solid var(--line);
    border-radius:12px;padding:12px;margin-bottom:10px;color:var(--txt)}
  .card:active{background:#232e5c}
  .card .top{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
  .card .nm{font-size:1rem;font-weight:700}
  .tier{font-size:.68rem;font-weight:800;border-radius:6px;padding:2px 7px;color:#0B0E1A}
  .tier.T1{background:#FF6B81}.tier.T2{background:var(--gold)}.tier.COLD{background:#7C86A8}
  .tag{font-size:.66rem;color:var(--dim);border:1px solid var(--line);border-radius:999px;padding:2px 8px}
  .stats{font-size:.7rem;color:var(--dim);margin-top:4px}
  .role{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:8px}
  .role .rh{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
  .rname{font-size:.72rem;color:#0B0E1A;font-weight:800;border-radius:6px;padding:2px 7px}
  .rc{background:#FF9AA2}.rsc{background:#9AB8FF}.rt{background:#8FD3A8}
  .uname{font-weight:750;font-size:.95rem}
  .items{display:flex;flex-wrap:wrap;gap:6px}
  .it{font-size:.75rem;border:1px solid var(--line);border-radius:8px;padding:4px 8px;background:#0F1530}
  .it.bis{border-color:var(--gold);color:var(--gold)}
  .lbl{font-size:.66rem;color:var(--dim);width:100%;margin-top:2px}
  .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .field{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:8px 10px}
  .field label{display:block;font-size:.68rem;color:var(--dim);margin-bottom:4px}
  .row{display:flex;align-items:center;gap:6px}
  select,input[type=number]{width:100%;background:transparent;border:none;color:var(--txt);
    font-size:1.1rem;font-weight:650;outline:none;appearance:none;-webkit-appearance:none}
  .stepper{display:flex;align-items:center;justify-content:space-between;gap:4px}
  .stepper b{font-size:1.1rem}
  .sbtn{width:34px;height:34px;flex:none;border-radius:8px;border:1px solid var(--line);
    background:#101632;color:var(--txt);font-size:1.1rem;line-height:1}
  .sbtn:active{background:#232e5c}
  .econ{margin-top:8px;font-size:.78rem;color:var(--dim)}
  .econ b{color:var(--gold)}
  .adv{border-radius:12px;padding:12px;border:1px solid var(--line);background:#0F1530}
  .adv .act{font-size:1.05rem;font-weight:800;margin-bottom:4px}
  .adv.a-lv .act{color:#9AB8FF}.adv.a-roll .act{color:#FF9AA2}.adv.a-save .act{color:#8FD3A8}
  .adv .why{font-size:.8rem;color:var(--dim);line-height:1.55}
  .bwrap{display:flex;gap:6px;align-items:stretch}
  .pboard{flex:1;display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .cell{aspect-ratio:1/1.05;border-radius:7px;border:1px dashed #202a4c;background:#0D1226;
    display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
  .cell.f{border-style:solid;background:#141c3d}
  .cell .n{font-size:.6rem;font-weight:750;line-height:1.05;text-align:center}
  .rowlbl{display:flex;flex-direction:column;justify-content:space-between;padding:2px 0}
  .rowlbl span{font-size:.58rem;color:var(--dim);writing-mode:vertical-rl;letter-spacing:2px}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
  .chip{padding:7px 10px;border-radius:999px;background:#0F1530;border:1px solid var(--line);
    font-size:.8rem;font-weight:650}
  footer{max-width:560px;margin:14px auto 0;padding:0 12px}
  .src{font-size:.64rem;color:var(--dim);text-align:center;margin-top:10px;line-height:1.6}
</style>
</head>

<header>
  <h1>TFT s17辅助脚本</h1><span class="ver">v0.7 · 阵容脚本重做</span>

/* ================= 存储 ================= */
function makeStore(){
  try{ const t="__t"; localStorage.setItem(t,"1"); localStorage.removeItem(t);
    return {get:k=>localStorage.getItem(k), set:(k,v)=>localStorage.setItem(k,v), del:k=>localStorage.removeItem(k)};
  }catch(e){ const m={}; return {get:k=>(k in m?m[k]:null), set:(k,v)=>{m[k]=v}, del:k=>{delete m[k]}}; }
}
const store = makeStore(); const KEY="tft17_v05";
function defaultState(){ return {comp:null, level:4, stage:2, round:1, gold:0, view:"app"}; }
let S = (function(){ try{const r=store.get(KEY); if(r) return Object.assign(defaultState(), JSON.parse(r));}catch(e){} return defaultState(); })();
function save(){ try{ store.set(KEY, JSON.stringify(S)); }catch(e){} }

/* ================= 每级阵容：≤5 级用开局包，6 级起用统计成型板 ================= */
function boardFor(comp, lv){
  if(lv>=6){
    const keys=Object.keys(comp.boards).map(Number).sort((a,b)=>a-b);
    let pick=keys[0];
    for(const k of keys){ if(lv>=k) pick=k; }
    return {ref:pick, list:comp.boards[pick], mode:"board"};
  }
  const n=Math.max(3, lv);
  return {ref:0, list:comp.opener.units.slice(0,n), mode:"opener"};
}

/* ================= 建议引擎 ================= */
const CURVE = [[2,1,4],[2,5,5],[3,2,6],[4,1,7],[4,2,8],[5,2,9]];
function curveTarget(st,rd){
  let t=3;
  for(const [s,r,lv] of CURVE){ if(st>s || (st===s && rd>=r)) t=lv; }
  return t;
}
function advise(comp, L, st, rd, G){
  const t = curveTarget(st,rd);
  if(comp.style==="anima"){
    if(st<=3) return {k:"save", act:"存钱 · 保持连败", why:"幻灵线 2~3 阶段的任务是叠 Tech 和滚利息：不升级、不 D 牌，金币尽快滚到 50 吃满档利息，商店只顺手拿核心对子。前提是场上有 3 幻灵在叠层。"};
    if(st===4 && rd<=2) return {k:"roll", act:"升级到 7 并 D 牌", why:"兑现窗口：4-1 / 4-2 升 7 一波 D 出主力两星，穿上 Anima 武器直接接管，四阶段目标近乎全胜。"};
    if(L<8 && (st>4 || rd>=5)) return {k:"lv", act:"升级到 8", why:"兑现后转入正常节奏：补 8 级上强度，守住赢回来的血量。"};
  }
  if(comp.style==="reroll6"){
    if(L<Math.min(t,6)) return {k:"lv", act:"升级到 "+Math.min(t,6), why:"先按基线节奏走到 6（2-1 升4 / 2-5 升5 / 3-2 升6），这套在 6 级闭环慢 D。"};
    if(L>=6 && st>=5 && G>=58) return {k:"lv", act:"升级到 7 提上限", why:"三星主力基本到手后，5 阶段起用多余的钱上 7 补四费/五费副 C。"};
    if(L>=6 && G>50) return {k:"roll", act:"D 牌（D 到剩 50 停）", why:"6 级慢 D 期：每回合只 D 超过 50 的部分，保住满档利息，直到主 C 三星。"};
    return {k:"save", act:"什么都不做 · 存钱", why:"金币未过 50：先滚利息，到 51+ 再开始慢 D。"};
  }
  if(comp.style==="reroll7"){
    if(L<Math.min(t,7)) return {k:"lv", act:"升级到 "+Math.min(t,7), why:"reroll 线同样按基线走到 7（4-1 到 7 级），到位后才开始慢 D。"};
    if(L>=7 && st>=5 && rd>=2 && G>=66) return {k:"lv", act:"升级到 8 提上限", why:"三星成型或 5 阶段过半后，把多余经济转成 8 级和高费卡，避免被后期阵容压强度。"};
    if(L>=7 && G>50) return {k:"roll", act:"D 牌（D 到剩 50 停）", why:"7 级慢 D 期：每回合只 D 超过 50 的部分，滚满利息追三星。"};
    return {k:"save", act:"什么都不做 · 存钱", why:"金币未过 50：先存，51+ 再慢 D。"};
  }
  if(L < t) return {k:"lv", act:"升级到 "+t, why:"按标准节奏当前应到 "+t+" 级（2-1 升4 / 2-5 升5 / 3-2 升6 / 4-1 升7 / 4-2 升8 / 5-2 升9），经济够就直接买经验。"};
  if(L===8 && G>=50 && (st>4 || (st===4 && rd>=2))) return {k:"roll", act:"D 牌找主力两星（可 D 到剩 30）", why:"8 级站 C 阵容的强度窗口在四阶段：先 D 出主 C / 主坦两星，稳住血量再考虑存 9。"};
  if(L===8 && st>=5 && G>=66) return {k:"lv", act:"升级到 9 补上限", why:"四阶段站稳后，5-2 起把经济转成 9 级，加入更多高费卡。"};
  if(L>=9 && G>20) return {k:"roll", act:"D 牌成型", why:"已到 9：把钱换成高费两星，保留 10~20 金机动。"};
  return {k:"save", act:"什么都不做 · 存钱", why:"等级已跟上节奏、金币未到动手档位：保留经济等下一个决策点。"};
}

DB.units.forEach(u=>{
  const ts=[];

  UNIT_TRAITS[u[0]]=ts;
});

function renderDB(){
  app.innerHTML=""; foot.innerHTML="";
  const back=document.createElement("button"); back.className="btn"; back.style.marginBottom="2px";
  back.textContent="← 返回助手";
  back.onclick=()=>{ S.view="app"; save(); render(); window.scrollTo(0,0); };
  app.appendChild(back);
  const s0=document.createElement("section");
  const h0=document.createElement("h2"); h0.textContent="数据库 · 核对版（请纠错）";
  s0.appendChild(h0);
  const m0=document.createElement("div"); m0.className="mini";
  m0.textContent=DB.meta+"。标记说明：✓ 多来源确认 · ○ 单一来源 · ? 推断 · 「待核对」完全没有可靠来源。看到错的/能补的，直接回我文字或截图（游戏内羁绊面板最好），我逐条替换。";
  s0.appendChild(m0);
  app.appendChild(s0);

  const s1=document.createElement("section");
  const h1=document.createElement("h2"); h1.textContent="① 羁绊 → 棋子对照";
  s1.appendChild(h1);
  DB.traits.forEach(([n,cnt,units,note])=>{
    const d=document.createElement("div"); d.className="role";
    const rh=document.createElement("div"); rh.className="rh";
    const nm=document.createElement("span"); nm.className="uname"; nm.textContent=n;
    const c=document.createElement("span"); c.className="mini"; c.textContent=cnt==="—"?"":("共 "+cnt+" 人");
    rh.append(nm,c);
    const u=document.createElement("div"); u.className="mini"; u.textContent=units;
    d.append(rh,u);
    if(note){ const nn=document.createElement("div"); nn.className="mini"; nn.style.opacity=".75"; nn.textContent=note; d.appendChild(nn); }
    s1.appendChild(d);
  });
  app.appendChild(s1);

  const s2=document.createElement("section");
  const h2=document.createElement("h2"); h2.textContent="② 法官（Arbiter）· 当前版本机制";
  s2.appendChild(h2);
  [["成员",DB.arbiter.units],["机制",DB.arbiter.mech],["数据",DB.arbiter.stat],["缺口",DB.arbiter.todo]].forEach(([k,v])=>{
    const d=document.createElement("div"); d.className="role";
    const rh=document.createElement("div"); rh.className="rh";
    const t=document.createElement("span"); t.className="rname rsc"; t.textContent=k;
    rh.appendChild(t);
    const m=document.createElement("div"); m.className="mini"; m.textContent=v;
    d.append(rh,m);
    s2.appendChild(d);
  });
  app.appendChild(s2);

  const sp=document.createElement("section");
  const hp=document.createElement("h2"); hp.textContent="③ 灵能特工 · 装备一览（共 6 件）";
  sp.appendChild(hp);
  const pn=document.createElement("div"); pn.className="mini"; pn.textContent=DB.psionicNote; sp.appendChild(pn);
  DB.psionicItems.forEach(([n,e])=>{
    const d=document.createElement("div"); d.className="role"; d.style.marginTop="8px";
    const rh=document.createElement("div"); rh.className="rh";
    const nm=document.createElement("span"); nm.className="uname"; nm.textContent=n; rh.appendChild(nm);
    const m=document.createElement("div"); m.className="mini"; m.textContent=e;
    d.append(rh,m); sp.appendChild(d);
  });
  app.appendChild(sp);

  const sg=document.createElement("section");
  const hg=document.createElement("h2"); hg.textContent="④ 观星者 · 七星象效果";
  sg.appendChild(hg);
  const gn=document.createElement("div"); gn.className="mini"; gn.textContent=DB.stargazerNote; sg.appendChild(gn);
  DB.constellations.forEach(([n,e])=>{
    const d=document.createElement("div"); d.className="role"; d.style.marginTop="8px";
    const rh=document.createElement("div"); rh.className="rh";
    const nm=document.createElement("span"); nm.className="uname"; nm.textContent=n; rh.appendChild(nm);
    const m=document.createElement("div"); m.className="mini"; m.textContent=e;
    d.append(rh,m); sg.appendChild(d);
  });
  app.appendChild(sg);

  const s3=document.createElement("section");
  const h3=document.createElement("h2"); h3.textContent="⑤ 全棋子总表（63）· 羁绊 / 定位 / 高频出装";
  s3.appendChild(h3);
  let curCost=0;
  DB.units.forEach(([cn,en,cost,traits,role,items])=>{
    if(cost!==curCost){
      curCost=cost;
      const cd=document.createElement("div"); cd.className="mini";
      cd.style.cssText="margin:10px 0 6px;font-weight:700;color:var(--c"+cost+")";
      cd.textContent="── "+cost+" 费 ──";
      s3.appendChild(cd);
    }
    const d=document.createElement("div"); d.className="role";
    const rh=document.createElement("div"); rh.className="rh";
    const nm=document.createElement("span"); nm.className="uname"; nm.textContent=cn;

    const i=document.createElement("div"); i.className="mini"; i.style.opacity=".8"; i.textContent="出装："+items;
    d.append(rh,t,i);
    s3.appendChild(d);
  });
  app.appendChild(s3);

  const d=document.createElement("div"); d.className="src";
  d.textContent="来源缩写：官=Riot官方 · M=Mobalytics · G=games.gg · E=eloboost24 · T=tactics.tools(Master+ 17.7) · O=OP.GG · B=BunnyMuffins · F=tftflow/metabot · ※=通用经验 · [O旧]=较早补丁的OP.GG快照，优先核对";
  foot.appendChild(d);
}

function updateNav(){
  const a=document.getElementById("navApp"), b=document.getElementById("navDB");
  if(!a||!b) return;
  a.style.background = S.view==="app" ? "#26315f" : "transparent";
  a.style.color = S.view==="app" ? "var(--txt)" : "var(--dim)";
  b.style.background = S.view==="db" ? "#26315f" : "transparent";
  b.style.color = S.view==="db" ? "var(--txt)" : "var(--dim)";
}
document.getElementById("navApp").onclick=()=>{ S.view="app"; save(); render(); };
document.getElementById("navDB").onclick=()=>{ S.view="db"; save(); render(); };

function render(){
  updateNav();
  if(S.view==="db"){ renderDB(); return; }
  S.comp ? renderMain() : renderSelect();
}
render();
</script>
